# Continuous Integration & Deployment pipeline to automate GitHub Pages builds
name: Deploy GaborNeuroFit to GitHub Pages

on:
  push:
    branches:
      - main # Runs automatically whenever you push code to the main branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm install

      - name: Compile Production Bundle
        run: npm run build

      - name: Deploy Compiled Bundle to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Deploys the compiled 'dist' output directory
          branch: gh-pages # Target branch for GitHub Pages hosting