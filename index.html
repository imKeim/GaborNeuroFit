<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--
      @clinical Viewport Lock. Prevents accidental pinch-to-zoom which would fundamentally
      destroy the calibrated spatial frequency (cycles per degree) of the Gabor targets.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>🧿 GaborNeuroFit</title>

    <link rel="icon" type="image/svg+xml" href="./assets/favicon-DSgW1i4M.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- PWA & Mobile Install Manifests -->
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GaborNeuroFit">
    <link class="apple-touch-icon" href="icon-192-maskable.png">
    <meta name="theme-color" content="#131a26">
  <script type="module" crossorigin src="./assets/index-B526kGKr.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-D3vDdAi4.css">
<link rel="manifest" href="./manifest.webmanifest"><script id="vite-plugin-pwa:inline-sw">if('serviceWorker' in navigator) {window.addEventListener('load', () => {navigator.serviceWorker.register('./sw.js', { scope: './' })})}</script></head>
<body>
    <!--
      @clinical FULLSCREEN CONSOLIDATION LAYER
      Placed at the root body level to guarantee absolute 100% viewport coverage.
      Delivers instantaneous positive/negative visual reinforcement safely via color
      temperature, avoiding startle reflexes associated with sudden brightness changes.
    -->
    <div id="flash-overlay" aria-hidden="true"></div>

    <!--
      @clinical POSTURE & ORIENTATION SHIELD
      Forces portrait mode anatomically. Landscape viewing dramatically distorts
      the 1:1 foveal isolation square and breaks comfortable 50-70cm ergonomic working distance.
    -->
    <div id="rotation-blocker" aria-hidden="true">
        <div id="rotation-text" data-i18n="lblRotationBlock"></div>
    </div>

    <!-- =========================================================
         APP SHELL (MAIN APPLICATION UI)
         ========================================================= -->
    <div id="app-wrapper">

        <!-- TOP HUD: System Navigation & Trigger Panel -->
        <header id="top-bar" role="banner">
            <h1 id="app-title" aria-label="Gabor Neuro Fit">🧿 GaborNeuroFit</h1>

            <nav id="top-controls" aria-label="Application Tools">
                <!-- Semantic buttons with explicit ARIA descriptions for clinical accessibility -->
                <button id="btn-mute" class="control-btn" aria-label="Toggle Sound">🔊</button>
                <button id="btn-pause" class="control-btn" aria-label="Pause Session">⏸️</button>
                <button id="btn-info" class="control-btn" aria-label="Clinical Handbook">ℹ️</button>
                <button id="btn-stats" class="control-btn" aria-label="Patient Dashboard">📊</button>
                <button id="btn-settings" class="control-btn" aria-label="Therapy Settings">🛠️</button>
            </nav>
        </header>

        <!-- MAIN: The Clinical Foveation Workspace -->
        <main id="workspace" role="main" aria-label="Visual Stimulation Arena">
            <!--
              @clinical ASPECT-RATIO 1:1 CONTAINER
              Strictly locked to a perfect square. Ensures mathematical circularity of the Gabor
              Gaussian envelope. Deformation here would ruin the spatial frequency calculations.
            -->
            <div id="container">
                <!-- GPU Hardware-Accelerated Bottom Layer (WebGL) -->
                <canvas id="gaborCanvas" width="256" height="256" aria-hidden="true"></canvas>
                <!-- HUD Transparent Top Layer (Canvas 2D) -->
                <canvas id="overlayCanvas" width="256" height="256" aria-hidden="true"></canvas>

                <!-- Protective Rest Shutter (Melts dynamically to avoid visual shock) -->
                <div id="calibration-curtain" class="active" aria-hidden="true"></div>

                <!-- Pause State Indicator -->
                <div id="pause-watermark" data-i18n="pauseWatermark" aria-hidden="true"></div>

                <!--
                  @clinical FOVEAL ANCHOR (FIXATION CROSS)
                  Crucial for controlling eccentric fixation. Patients must look strictly here
                  and resolve targets in their para-fovea to trigger true neurological plasticity.
                -->
                <div id="cross" class="cross-dimmed" aria-hidden="true">
                    <div class="cross-line-h"></div>
                    <div class="cross-line-v"></div>
                </div>
            </div>
        </main>

        <!-- FOOTER: Telemetry, Biofeedback & Input Deck -->
        <footer id="bottom-dock">

            <!--
              @clinical LIVE TELEMETRY BOARD
              Uses aria-live="polite" to gently announce score changes to visually impaired
              patients via VoiceOver / TalkBack without interrupting the flow.
            -->
            <section id="score-board" aria-live="polite" aria-atomic="true">
                <div id="score-text"></div>

                <!-- Gabor Badges -->
                <div id="indicators">
                    <span class="badge" style="color: #22c55e; border-color: rgba(34, 197, 94, 0.3); background: rgba(34, 197, 94, 0.12);"><span data-i18n="stage"></span>: <span id="current-level">1</span>/5</span>
                    <span class="badge" style="color: #3b90ff; border-color: rgba(59, 144, 255, 0.3); background: rgba(59, 144, 255, 0.12);"><span data-i18n="contrast"></span>: <span id="current-contrast">50</span>%</span>
                    <span id="badge-gabor-streak" class="badge" style="color: #eab308; border-color: rgba(234, 179, 8, 0.3); background: rgba(234, 179, 8, 0.12); font-weight: bold;">🔥 0</span>
                    <span id="badge-timer-gabor" class="badge" style="display: none; color: #ef4444; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.12);">🍅 00:00</span>
                </div>

                <!-- Synoptophore Badges -->
                <div id="synop-indicators" style="display: none; justify-content: center; gap: 6px;">
                    <span id="badge-prism-x" class="badge" style="color: #3b90ff; border-color: rgba(59, 144, 255, 0.3); background: rgba(59, 144, 255, 0.12);">X: 0px (0.00Δ)</span>
                    <span id="badge-prism-y" class="badge" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.12);">Y: 0px (0.00Δ)</span>
                    <span id="badge-synop-score" class="badge" style="color: #eab308; border-color: rgba(234, 179, 8, 0.3); background: rgba(234, 179, 8, 0.12); font-weight: bold;">🏆 0</span>
                    <span id="badge-timer-synop" class="badge" style="display: none; color: #ef4444; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.12);">🍅 00:00</span>
                </div>

                <!-- RDS Badges -->
                <div id="rds-indicators" style="display: none; justify-content: center; gap: 6px;">
                    <span id="badge-rds-level" class="badge" style="color: #22c55e; border-color: rgba(34, 197, 94, 0.3); background: rgba(34, 197, 94, 0.12);">Stage: 1/5</span>
                    <span id="badge-rds-disparity" class="badge" style="color: #3b90ff; border-color: rgba(59, 144, 255, 0.3); background: rgba(59, 144, 255, 0.12);">Depth: 4px</span>
                    <span id="badge-rds-streak" class="badge" style="color: #eab308; border-color: rgba(234, 179, 8, 0.3); background: rgba(234, 179, 8, 0.12); font-weight: bold;">🔥 0</span>
                    <span id="badge-timer-rds" class="badge" style="display: none; color: #ef4444; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.12);">🍅 00:00</span>
                </div>

                <!-- Dynamic Ocular Vergence Progress Bar (Hardware Accelerated) -->
                <div id="synop-progress-container" style="display: none; width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-top: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.02);" aria-hidden="true">
                    <div id="synop-progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #007aff, #22c55e); transition: width 0.25s cubic-bezier(0.25, 1, 0.5, 1);"></div>
                </div>
            </section>

            <!-- TACTILE INPUT DECK -->
            <section id="controls-layout" aria-label="Therapy Controls">
                <!-- Active Template & Temporal Constraints -->
                <div id="mode-status-bar" aria-hidden="true">
                    <span><span data-i18n="lblActiveMode">Mode</span>: <strong id="val-active-mode" style="color: #007aff;">Classic</strong></span>
                    <span><span data-i18n="lblActiveSpeed">Speed</span>: <strong id="val-active-speed">Adaptive</strong></span>
                </div>

                <!-- PRIMARY TRIGGER (Operated strictly by State Machines via Typescript Injection) -->
                <button type="button" id="btn-start" aria-label="Execute Primary Action"></button>

                <!-- MOTOR/SENSORY SWITCHAROOS -->
                <div id="action-buttons">
                    <button type="button" class="action-btn" id="btn-left" aria-label="Choose Left">
                        <span>◀</span>
                        <div class="btn-label" data-i18n="leftBtn"></div>
                    </button>
                    <button type="button" class="action-btn" id="btn-reset" aria-label="Reset Coordinates" style="display: none;">
                        <span>🔄</span>
                        <div class="btn-label" data-i18n="resetBtn"></div>
                    </button>
                    <button type="button" class="action-btn" id="btn-right" aria-label="Choose Right">
                        <span>▶</span>
                        <div class="btn-label" data-i18n="rightBtn"></div>
                    </button>
                </div>
            </section>

        </footer>

    </div> <!-- Close #app-wrapper -->

    <!-- =========================================================
         MODALS, DIALOGS & OVERLAYS (PORTAL LAYER)
         ========================================================= -->
    <!--
      @clinical PORTAL PATTERN ARCHITECTURE
      All dialogs are hoisted completely out of the App Shell DOM flow.
      This prevents Cumulative Layout Shifts (CLS) upon dialog rendering and
      guarantees absolute Z-Index supremacy over the WebGL Canvas context.
    -->
    <aside id="modal-layer">

        <!-- CONFIGURATION PANEL MODAL: Scrollable settings cards -->
        <div id="settings-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <div class="modal-content">
                <h2 id="settingsTitle" data-i18n="settingsTitle"></h2>

                <!-- Symmetrical Settings Mode Switcher (3-Tab config) -->
                <nav id="settings-mode-bar" aria-label="Settings Categories" style="display: flex; background: #131a26; padding: 4px; border-radius: 10px; border: 1px solid #2b354a; margin-bottom: 14px; margin-left: auto; margin-right: auto; width: 100%;">
                    <button type="button" id="settings-tab-gabor" class="tab-btn active" data-i18n="tabGabor"></button>
                    <button type="button" id="settings-tab-synop" class="tab-btn" data-i18n="tabSynop"></button>
                    <button type="button" id="settings-tab-rds" class="tab-btn" data-i18n="tabRDS"></button>
                </nav>

                <div class="modal-scroll-body" tabindex="0">

                    <!-- GROUP 1: Core clinical setup (Default expanded) -->
                    <div class="accordion-header" id="accordion-header-1" role="button" aria-expanded="true" aria-controls="accordion-content-1">
                        <span data-i18n="lblSettingGroup1"></span>
                        <span class="accordion-arrow active" id="accordion-arrow-1" aria-hidden="true">›</span>
                    </div>
                    <div class="accordion-content open" id="accordion-content-1" role="region" aria-labelledby="accordion-header-1">
                        <div class="settings-row">
                            <label data-i18n="lblSettingLang" for="select-lang"></label>
                            <select id="select-lang">
                                <option value="en">🇬🇧 English</option>
                                <option value="ru">🇷🇺 Русский</option>
                            </select>
                        </div>
                        <div class="settings-row" id="row-preset-mode" data-visible-in="gabor" style="flex-direction: column; align-items: flex-start; gap: 4px; margin-top: 5px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingPreset" for="select-preset-mode"></label>
                                <select id="select-preset-mode">
                                    <option value="occlusion" data-i18n="optPresetOcclusion"></option>
                                    <option value="blitz" data-i18n="optPresetBlitz"></option>
                                    <option value="binocular" data-i18n="optPresetBinocular"></option>
                                    <option value="flicker" data-i18n="optPresetFlicker"></option>
                                    <option value="peripheral" data-i18n="optPresetPeripheral"></option>
                                    <option value="custom" data-i18n="optPresetCustom"></option>
                                </select>
                            </div>
                            <span class="settings-help" data-i18n="helpPresetMode" id="help-preset-mode"></span>
                        </div>
                        <!-- Gabor Level Selector -->
                        <div class="settings-row" id="row-start-level" data-visible-in="gabor" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingStartLevel" for="select-start-level"></label>
                                <select id="select-start-level">
                                    <option value="1" id="opt-stage-1"></option>
                                    <option value="2" id="opt-stage-2"></option>
                                    <option value="3" id="opt-stage-3"></option>
                                    <option value="4" id="opt-stage-4"></option>
                                    <option value="5" id="opt-stage-5"></option>
                                </select>
                            </div>
                            <span class="settings-help" data-i18n="helpStartLevel" id="help-start-level"></span>
                        </div>
                        <div class="settings-row" id="row-autonext" data-visible-in="gabor" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingAutonext" for="select-autonext"></label>
                                <select id="select-autonext">
                                    <option value="true" data-i18n="optAutonextOn"></option>
                                    <option value="false" data-i18n="optAutonextOff"></option>
                                </select>
                            </div>
                            <span class="settings-help" data-i18n="helpAutonext"></span>
                        </div>
                        <!-- RDS Dedicated Auto-Next Selector -->
                        <div class="settings-row" id="row-rds-autonext" data-visible-in="rds" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingRdsAutonext" for="select-rds-autonext"></label>
                                <select id="select-rds-autonext">
                                    <option value="true" data-i18n="optAutonextOn"></option>
                                    <option value="false" data-i18n="optAutonextOff"></option>
                                </select>
                            </div>
                            <span class="settings-help" data-i18n="helpRdsAutonext"></span>
                        </div>
                        <!-- Unified Session Limit -->
                        <div class="settings-row" id="row-session-limit" data-visible-in="gabor,rds" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingLimit" for="select-session-limit"></label>
                                <select id="select-session-limit">
                                    <!-- Dynamic options injected strongly by TS -->
                                </select>
                            </div>
                            <span class="settings-help" data-i18n="helpSessionLimit"></span>
                        </div>
                        <!-- Pomodoro Limit -->
                        <div class="settings-row" style="border-bottom: none; padding-bottom: 0; margin-bottom: 0; flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingTimerLimit" for="select-timer-limit"></label>
                                <select id="select-timer-limit">
                                    <option value="0" data-i18n="optTimerOff"></option>
                                    <option value="5" data-i18n="optTimer5"></option>
                                    <option value="10" data-i18n="optTimer10"></option>
                                    <option value="15" data-i18n="optTimer15"></option>
                                    <option value="20" data-i18n="optTimer20"></option>
                                </select>
                            </div>
                            <span class="settings-help" data-i18n="helpTimerLimit"></span>
                        </div>
                    </div>

                    <!-- GROUP 2: Temporal stimulation pacing -->
                    <div class="accordion-header" id="accordion-header-2" data-visible-in="gabor" role="button" aria-expanded="false" aria-controls="accordion-content-2">
                        <span data-i18n="lblSettingGroup2"></span>
                        <span class="accordion-arrow" id="accordion-arrow-2" aria-hidden="true">›</span>
                    </div>
                    <div class="accordion-content" id="accordion-content-2" data-visible-in="gabor" role="region" aria-labelledby="accordion-header-2">
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingFlash" for="select-flash-duration"></label>
                                <select id="select-flash-duration">
                                    <option value="adaptive" data-i18n="optFlashAdaptive"></option>
                                    <option value="100" data-i18n="optFlash100"></option>
                                    <option value="180" data-i18n="optFlash180"></option>
                                    <option value="200" data-i18n="optFlash200"></option>
                                    <option value="350" data-i18n="optFlash350"></option>
                                </select>
                            </div>
                            <span class="settings-help" data-i18n="helpFlashDuration" id="help-flash-duration"></span>
                        </div>
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingStageAdvance" for="chk-stage-advance"></label>
                                <input type="checkbox" id="chk-stage-advance">
                            </div>
                            <span class="settings-help" data-i18n="helpStageAdvance" id="help-stage-advance"></span>
                        </div>
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingStatic" for="chk-static"></label>
                                <input type="checkbox" id="chk-static">
                            </div>
                            <span class="settings-help" data-i18n="helpStatic" id="help-static"></span>
                        </div>
                        <!-- TS Reactivity Link: row-flicker visibility is tied to chk-static -->
                        <div class="settings-row" id="row-flicker" style="flex-direction: column; align-items: flex-start; gap: 4px; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingFlicker" for="chk-flicker"></label>
                                <input type="checkbox" id="chk-flicker">
                            </div>
                            <span class="settings-help" data-i18n="helpFlicker" id="help-flicker"></span>
                        </div>
                    </div>

                    <!-- GROUP 3: Spatial configuration & anti-crowding -->
                    <div class="accordion-header" id="accordion-header-3" data-visible-in="gabor" role="button" aria-expanded="false" aria-controls="accordion-content-3">
                        <span data-i18n="lblSettingGroup3"></span>
                        <span class="accordion-arrow" id="accordion-arrow-3" aria-hidden="true">›</span>
                    </div>
                    <div class="accordion-content" id="accordion-content-3" data-visible-in="gabor" role="region" aria-labelledby="accordion-header-3">
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingPermanentCross" for="chk-permanent-cross"></label>
                                <input type="checkbox" id="chk-permanent-cross">
                            </div>
                            <span class="settings-help" data-i18n="helpPermanentCross" id="help-permanent-cross"></span>
                        </div>
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingLowContrast" for="chk-low-contrast"></label>
                                <input type="checkbox" id="chk-low-contrast">
                            </div>
                            <span class="settings-help" data-i18n="helpLowContrast" id="help-low-contrast"></span>
                        </div>
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingWideVariance" for="chk-wide-variance"></label>
                                <input type="checkbox" id="chk-wide-variance">
                            </div>
                            <span class="settings-help" data-i18n="helpWideVariance" id="help-wide-variance"></span>
                        </div>
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingShapeVariance" for="chk-shape-variance"></label>
                                <input type="checkbox" id="chk-shape-variance">
                            </div>
                            <span class="settings-help" data-i18n="helpShapeVariance" id="help-shape-variance"></span>
                        </div>
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingPeripheral" for="chk-peripheral"></label>
                                <input type="checkbox" id="chk-peripheral">
                            </div>
                            <span class="settings-help" data-i18n="helpPeripheral" id="help-peripheral"></span>
                        </div>
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingCrowding" for="chk-crowding"></label>
                                <input type="checkbox" id="chk-crowding">
                            </div>
                            <span class="settings-help" data-i18n="helpCrowding" id="help-crowding"></span>
                        </div>
                        <div class="settings-row" id="row-crowding-mode" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingCrowdingMode" for="select-crowding-mode"></label>
                                <select id="select-crowding-mode">
                                    <option value="vertical" data-i18n="optCrowdingVertical"></option>
                                    <option value="horizontal" data-i18n="optCrowdingHorizontal"></option>
                                    <option value="all" data-i18n="optCrowdingAll"></option>
                                </select>
                            </div>
                        </div>
                        <div class="settings-row" id="row-flanker-distance" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingFlankerDistance" for="select-flanker-distance"></label>
                                <select id="select-flanker-distance">
                                    <option value="2" data-i18n="optFlankerDistanceClose"></option>
                                    <option value="4" data-i18n="optFlankerDistanceFar"></option>
                                </select>
                            </div>
                            <span class="settings-help" data-i18n="helpFlankerDistance"></span>
                        </div>
                        <!-- TS Reactivity Link: row-orthogonal and row-dynamic opacities are tied to chk-crowding -->
                        <div class="settings-row" id="row-orthogonal" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingOrthogonal" for="chk-orthogonal-flankers"></label>
