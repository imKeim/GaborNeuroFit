<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🧿 GaborNeuroFit</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GaborNeuroFit">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#131a26">
</head>
<body>
    <!-- CRITICAL: Fullscreen hardware-accelerated overlay for success/error flash feedback -->
    <div id="flash-overlay"></div>

    <!-- CRITICAL: Prevents mobile landscape layout breaks. Forced via CSS media queries -->
    <div id="rotation-blocker">
        <div id="rotation-text" data-i18n="lblRotationBlock"></div>
    </div>

    <div id="app-wrapper">
        <!-- TOP HUD: Holds main settings and diagnostic triggers -->
        <div id="top-bar">
            <div id="app-title">🧿 GaborNeuroFit</div>
            <div id="top-controls">
                <div id="btn-mute" class="control-btn">🔊</div>
                <div id="btn-info" class="control-btn">ℹ️</div>
                <div id="btn-stats" class="control-btn">📊</div>
                <div id="btn-settings" class="control-btn">🛠️</div>
            </div>
        </div>

        <!-- WORKSPACE: Aspect-ratio locked (1:1) training area. 
             CRITICAL: gaborCanvas (WebGL/CPU) and overlayCanvas (2D Transparent HUD) 
             MUST sit absolutely stacked over each other at 100% width/height. -->
        <div id="workspace">
            <div id="container">
                <div id="cross">+</div>
                <canvas id="gaborCanvas" width="256" height="256"></canvas>
                <canvas id="overlayCanvas" width="256" height="256"></canvas>
            </div>
        </div>

        <!-- BOTTOM HUD: Session scoreboard, status descriptors, and user tactile inputs -->
        <div id="bottom-dock">
            <div id="score-board">
                <div id="score-text"></div>
                <div id="indicators">
                    <!-- i18n Engine: Uses data-i18n for secure plain-text content injection (textContent) -->
                    <span class="badge"><span data-i18n="stage"></span>: <span id="current-level">1</span>/5</span>
                    <span class="badge"><span data-i18n="contrast"></span>: <span id="current-contrast">50</span>%</span>
                    <span class="badge"><span data-i18n="streak"></span>: <span id="current-streak">0</span></span>
                </div>
            </div>

            <div id="controls-layout">
                <div id="mode-status-bar">
                    <span><span data-i18n="lblActiveMode">Mode</span>: <strong id="val-active-mode" style="color: #007aff;">Classic</strong></span>
                    <span><span data-i18n="lblActiveSpeed">Speed</span>: <strong id="val-active-speed">Adaptive</strong></span>
                </div>
                <!-- CRITICAL: btn-start is dynamically populated procedurally in app.js on load/state change. No static i18n. -->
                <button id="btn-start"></button>
                <div id="action-buttons">
                    <button class="action-btn" id="btn-left">
                        <span>◀</span>
                        <div class="btn-label" data-i18n="leftBtn"></div>
                    </button>
                    <button class="action-btn" id="btn-right">
                        <span>▶</span>
                        <div class="btn-label" data-i18n="rightBtn"></div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- CONFIGURATION PANEL MODAL: Scrollable settings cards -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="settingsTitle"></h2>
            
            <div class="modal-scroll-body">
                
                <!-- GROUP 1: Core clinical setup (Default expanded) -->
                <div class="accordion-header" id="accordion-header-1">
                    <span data-i18n="lblSettingGroup1"></span>
                    <span class="accordion-arrow active" id="accordion-arrow-1">›</span>
                </div>
                <div class="accordion-content open" id="accordion-content-1">
                    <div class="settings-row">
                        <label data-i18n="lblSettingLang"></label>
                        <select id="select-lang">
                            <option value="en">🇬🇧 English</option>
                            <option value="ru">🇷🇺 Русский</option>
                        </select>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px; margin-top: 5px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingPreset"></label>
                            <!-- CRITICAL: Always preserve complete closing select tags. Do not truncate brackets. 
                                 Option tags utilize data-i18n for dynamic language injection. -->
                            <select id="select-preset-mode">
                                <option value="occlusion" data-i18n="optPresetOcclusion"></option>
                                <option value="blitz" data-i18n="optPresetBlitz"></option>
                                <option value="binocular" data-i18n="optPresetBinocular"></option>
                                <option value="flicker" data-i18n="optPresetFlicker"></option>
                                <option value="peripheral" data-i18n="optPresetPeripheral"></option>
                                <option value="custom" data-i18n="optPresetCustom"></option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpPresetMode" id="help-preset-mode"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingStartLevel"></label>
                            <select id="select-start-level">
                                <option value="1" id="opt-stage-1"></option>
                                <option value="2" id="opt-stage-2"></option>
                                <option value="3" id="opt-stage-3"></option>
                                <option value="4" id="opt-stage-4"></option>
                                <option value="5" id="opt-stage-5"></option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpStartLevel" id="help-start-level"></span>
                    </div>
                    <div class="settings-row">
                        <label data-i18n="lblSettingAutonext"></label>
                        <select id="select-autonext">
                            <option value="true" data-i18n="optAutonextOn"></option>
                            <option value="false" data-i18n="optAutonextOff"></option>
                        </select>
                    </div>
                    <div class="settings-row" style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                        <label data-i18n="lblSettingLimit"></label>
                        <select id="select-session-limit">
                            <option value="0" data-i18n="optLimitOff"></option>
                            <option value="40">40</option>
                            <option value="80">80</option>
                            <option value="120">120</option>
                            <option value="160">160</option>
                        </select>
                    </div>
                </div>

                <!-- GROUP 2: Temporal stimulation pacing (Default collapsed) -->
                <div class="accordion-header" id="accordion-header-2">
                    <span data-i18n="lblSettingGroup2"></span>
                    <span class="accordion-arrow" id="accordion-arrow-2">›</span>
                </div>
                <div class="accordion-content" id="accordion-content-2">
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingFlash"></label>
                            <select id="select-flash-duration">
                                <option value="adaptive" data-i18n="optFlashAdaptive"></option>
                                <option value="100" data-i18n="optFlash100"></option>
                                <option value="180" data-i18n="optFlash180"></option>
                                <option value="200" data-i18n="optFlash200"></option>
                                <option value="350" data-i18n="optFlash350"></option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpFlashDuration" id="help-flash-duration"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingStageAdvance"></label>
                            <input type="checkbox" id="chk-stage-advance">
                        </div>
                        <span class="settings-help" id="help-stage-advance"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingStatic"></label>
                            <input type="checkbox" id="chk-static">
                        </div>
                        <span class="settings-help" data-i18n="helpStatic" id="help-static"></span>
                    </div>
                    <!-- CRITICAL: row-flicker visibility is tied re-actively to chk-static in settings.js -->
                    <div class="settings-row" id="row-flicker" style="flex-direction: column; align-items: flex-start; gap: 4px; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingFlicker"></label>
                            <input type="checkbox" id="chk-flicker">
                        </div>
                        <span class="settings-help" data-i18n="helpFlicker" id="help-flicker"></span>
                    </div>
                </div>

                <!-- GROUP 3: Spatial configuration & anti-crowding (Default collapsed) -->
                <div class="accordion-header" id="accordion-header-3">
                    <span data-i18n="lblSettingGroup3"></span>
                    <span class="accordion-arrow" id="accordion-arrow-3">›</span>
                </div>
                <div class="accordion-content" id="accordion-content-3">
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingLowContrast"></label>
                            <input type="checkbox" id="chk-low-contrast">
                        </div>
                        <span class="settings-help" data-i18n="helpLowContrast" id="help-low-contrast"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingWideVariance"></label>
                            <input type="checkbox" id="chk-wide-variance">
                        </div>
                        <span class="settings-help" data-i18n="helpWideVariance" id="help-wide-variance"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingShapeVariance"></label>
                            <input type="checkbox" id="chk-shape-variance">
                        </div>
                        <span class="settings-help" data-i18n="helpShapeVariance" id="help-shape-variance"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingPeripheral"></label>
                            <input type="checkbox" id="chk-peripheral">
                        </div>
                        <span class="settings-help" data-i18n="helpPeripheral" id="help-peripheral"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingCrowding"></label>
                            <input type="checkbox" id="chk-crowding">
                        </div>
                        <span class="settings-help" data-i18n="helpCrowding" id="help-crowding"></span>
                    </div>
                    <!-- CRITICAL: row-orthogonal and row-dynamic visibility/opacities are tied re-actively to chk-crowding in settings.js -->
                    <div class="settings-row" id="row-orthogonal" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingOrthogonal"></label>
                            <input type="checkbox" id="chk-orthogonal-flankers">
                        </div>
                        <span class="settings-help" data-i18n="helpOrthogonal" id="help-orthogonal"></span>
                    </div>
                    <div class="settings-row" id="row-dynamic" style="flex-direction: column; align-items: flex-start; gap: 4px; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingDynamic"></label>
                            <input type="checkbox" id="chk-dynamic-flankers">
                        </div>
                        <span class="settings-help" data-i18n="helpDynamic" id="help-dynamic"></span>
                    </div>
                </div>

                <!-- GROUP 4: Binocular 3D Setup & sub-pixel RGB sliders -->
                <div class="accordion-header" id="accordion-header-4">
                    <span data-i18n="lblSettingGroup4"></span>
                    <span class="accordion-arrow" id="accordion-arrow-4">›</span>
                </div>
                <div class="accordion-content" id="accordion-content-4">
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingAnaglyph"></label>
                            <input type="checkbox" id="chk-anaglyph">
                        </div>
                        <span class="settings-help" data-i18n="helpAnaglyph" id="help-anaglyph"></span>
                    </div>

                    <!-- CRITICAL: anaglyph-settings-panel opacity and disabled states are controlled re-actively by chk-anaglyph in settings.js -->
                    <div id="anaglyph-settings-panel" style="border-top: 1px dashed #2b354a; padding-top: 12px; margin-top: 10px; margin-bottom: 0;">
                        <div class="settings-row">
                            <label data-i18n="lblSettingRedSide"></label>
                            <select id="select-red-side">
                                <option value="left" data-i18n="optSideLeft"></option>
                                <option value="right" data-i18n="optSideRight"></option>
                            </select>
                        </div>
                        <div class="settings-row">
                            <label data-i18n="lblSettingLazySide"></label>
                            <select id="select-lazy-side">
                                <option value="left" data-i18n="optSideLeft"></option>
                                <option value="right" data-i18n="optSideRight"></option>
                            </select>
                        </div>
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%;">
                                <label data-i18n="lblSettingStrongAttenuation"></label>
                                <span id="val-strong-attenuation" style="color: #3b90ff; font-weight: bold;">30%</span>
                            </div>
                            <input type="range" id="range-strong-attenuation" min="10" max="100" step="5" value="30" style="width: 100%; accent-color: #007aff; cursor: pointer; margin-top: 6px;">
                        </div>
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingFusionLock"></label>
                                <input type="checkbox" id="chk-fusion-lock">
                            </div>
                            <span class="settings-help" data-i18n="helpFusionLock" id="help-fusion-lock"></span>
                        </div>
                        <!-- Left Lens Calibration (Subpixel Red balance) -->
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <!-- i18n-html: Used for rendering translated nodes that contain embedded rich html tags (like <br>) -->
                                <span data-i18n-html="lblSettingLeftColor" style="font-size: 13px; font-weight: 500;"></span>
                                <span id="val-calib-r" style="color: #ef4444; font-weight: bold; font-size: 13px;">255</span>
                            </div>
                            <div style="width: 100%; display: flex; flex-direction: column; gap: 6px; padding-left: 4px;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="width: 12px; font-size: 11px; font-weight: bold; color: #ef4444;">R</span>
                                    <input type="range" id="slider-left-r" min="0" max="255" value="255" style="flex: 1; accent-color: #ef4444; height: 4px; cursor: pointer;">
                                </div>
                            </div>
                        </div>
                        <!-- Right Lens Calibration (Subpixel Green/Blue balance) -->
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 8px; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <span data-i18n-html="lblSettingRightColor" style="font-size: 13px; font-weight: 500;"></span>
                                <div style="display: flex; gap: 8px; font-size: 13px; font-weight: bold;">
                                    <span style="color: #22c55e;">G: <span id="val-calib-g">255</span></span>
                                    <span style="color: #3b82f6;">B: <span id="val-calib-b">255</span></span>
                                </div>
                            </div>
                            <div style="width: 100%; flex-direction: column; gap: 6px; padding-left: 4px;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="width: 12px; font-size: 11px; font-weight: bold; color: #22c55e;">G</span>
                                    <input type="range" id="slider-right-g" min="0" max="255" value="255" style="flex: 1; accent-color: #22c55e; height: 4px; cursor: pointer;">
                                </div>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="width: 12px; font-size: 11px; font-weight: bold; color: #3b82f6;">B</span>
                                    <input type="range" id="slider-right-b" min="0" max="255" value="255" style="flex: 1; accent-color: #3b82f6; height: 4px; cursor: pointer;">
                                </div>
                            </div>
                        </div>
                        <button id="btn-fusion-test" class="close-btn" data-i18n="btnFusionTestLabel" style="background: #1a233a; border: 1px solid #3b90ff; color: #3b90ff; margin-top: 14px; font-weight: bold;"></button>
                    </div>
                </div>

                <p style="font-size: 11px; color: #8e8e93; line-height: 1.3; margin-top: 15px;" data-i18n="descModeExplanation" id="desc-mode-explanation"></p>
            </div>

            <button id="btn-close-settings" class="close-btn">OK</button>
        </div>
    </div>

    <!-- INFO HANDBOOK MODAL -->
    <div id="info-modal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="modalTitle"></h2>
            <div class="modal-scroll-body">
                <h4 data-i18n="secAboutTitle"></h4>
                <p data-i18n-html="secAboutText"></p>
                <h4 data-i18n="secInstructionsTitle"></h4>
                <ul data-i18n-html="secInstructionsText" id="sec-instructions-list"></ul>
                <h4 data-i18n="secLevelsTitle"></h4>
                <ul data-i18n-html="secLevelsList" id="sec-levels-list"></ul>
                <h4 data-i18n="secPresetsTitle"></h4>
                <ul data-i18n-html="secPresetsText" id="sec-presets-list"></ul>
                <h4 data-i18n="secRecommendationsTitle"></h4>
                <ul data-i18n-html="secRecommendationsText" id="sec-recommendations-list"></ul>
            </div>
            <button id="btn-close-modal" class="close-btn">OK</button>
        </div>
    </div>

    <!-- HISTORICAL LEADERBOARD MODAL (Classic flat version, limits up to 7 records) -->
    <div id="stats-modal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="statsTitle"></h2>
            <div class="modal-scroll-body">
                <div id="leaderboard" style="width: 100%; margin-top: 15px;">
                    <ul id="leaderboard-list"></ul>
                </div>
            </div>
            <button id="btn-close-stats" class="close-btn">OK</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js"></script>
    <script type="module" src="/src/app.js"></script>
</body>
</html>
