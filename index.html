<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🧿 GaborNeuroFit</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon-BTXb1dGy.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-CpVbsetc.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-Du26lQ0g.css">
</head>
<body>
    <!-- Hardware-accelerated feedback flash layer -->
    <div id="flash-overlay"></div>

    <!-- Global Dynamic Landscape Rotation Blocker -->
    <div id="rotation-blocker">
        <div id="rotation-text"></div>
    </div>

    <div id="app-wrapper">
        <!-- Top Utility Header Panel -->
        <div id="top-bar">
            <div id="app-title">🧿 GaborNeuroFit</div>
            <div id="top-controls">
                <div id="btn-mute" class="control-btn">🔊</div>
                <div id="btn-info" class="control-btn">ℹ️</div>
                <div id="btn-stats" class="control-btn">📊</div>
                <div id="btn-settings" class="control-btn">🛠️</div>
            </div>
        </div>

        <!-- Central Training Workspace -->
        <div id="workspace">
            <div id="container">
                <div id="cross">+</div>
                <canvas id="gaborCanvas" width="256" height="256"></canvas>
            </div>
        </div>

        <!-- Bottom Interface & Controls Panel -->
        <div id="bottom-dock">
            <div id="score-board">
                <div id="score-text"></div>
                <div id="indicators">
                    <span class="badge"><span id="lbl-stage"></span>: <span id="current-level">1</span>/5</span>
                    <span class="badge"><span id="lbl-contrast"></span>: <span id="current-contrast">50</span>%</span>
                    <span class="badge"><span id="lbl-streak"></span>: <span id="current-streak">0</span></span>
                </div>
            </div>

            <div id="controls-layout">
                <div id="mode-status-bar">
                    <span><span id="lbl-active-mode">Mode</span>: <strong id="val-active-mode" style="color: #007aff;">Classic</strong></span>
                    <span><span id="lbl-active-speed">Speed</span>: <strong id="val-active-speed">Adaptive</strong></span>
                </div>
                <button id="btn-start"></button>
                <div id="action-buttons">
                    <button class="action-btn" id="btn-left">
                        <span>◀</span>
                        <div class="btn-label" id="lbl-btn-left"></div>
                    </button>
                    <button class="action-btn" id="btn-right">
                        <span>▶</span>
                        <div class="btn-label" id="lbl-btn-right"></div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Configuration Panel Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 id="settings-title"></h2>
            
            <div class="modal-scroll-body">
                <!-- Group 1: Core Setup (Expanded by default) -->
                <div class="accordion-header" id="accordion-header-1">
                    <span id="lbl-setting-group-1"></span>
                    <span class="accordion-arrow active" id="accordion-arrow-1">›</span>
                </div>
                <div class="accordion-content open" id="accordion-content-1">
                    <!-- Global Application Language Settings Row -->
                    <div class="settings-row">
                        <label id="lbl-setting-lang"></label>
                        <select id="select-lang">
                            <option value="en">🇬🇧 English</option>
                            <option value="ru">🇷🇺 Русский</option>
                        </select>
                    </div>

                    <!-- Training Preset Macro Select -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px; margin-top: 5px;">                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-mode"></label>
                            <select id="select-preset-mode">
                                <option value="occlusion" id="opt-preset-occlusion"></option>
                                <option value="blitz" id="opt-preset-blitz"></option>
                                <option value="binocular" id="opt-preset-binocular"></option>
                                <option value="flicker" id="opt-preset-flicker"></option>
                                <option value="peripheral" id="opt-preset-peripheral"></option>
                                <option value="custom" id="opt-preset-custom"></option>
                            </select>
                        </div>
                        <span class="settings-help" id="help-preset-mode"></span>
                    </div>

                    <!-- Starting Level Selector -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-start-level"></label>
                            <select id="select-start-level">
                                <option value="1" id="opt-stage-1"></option>
                                <option value="2" id="opt-stage-2"></option>
                                <option value="3" id="opt-stage-3"></option>
                                <option value="4" id="opt-stage-4"></option>
                                <option value="5" id="opt-stage-5"></option>
                            </select>
                        </div>
                        <span class="settings-help" id="help-start-level"></span>
                    </div>

                    <!-- Post-Answer Autonext Transition Config -->
                    <div class="settings-row">
                        <label id="lbl-setting-autonext"></label>
                        <select id="select-autonext">
                            <option value="true" id="opt-autonext-on"></option>
                            <option value="false" id="opt-autonext-off"></option>
                        </select>
                    </div>

                    <!-- Session Progress Limit -->
                    <div class="settings-row" style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                        <label id="lbl-setting-limit"></label>
                        <select id="select-session-limit">
                            <option value="0" id="opt-limit-off"></option>
                            <option value="40">40</option>
                            <option value="80">80</option>
                            <option value="120">120</option>
                            <option value="160">160</option>
                        </select>
                    </div>
                </div>

                <!-- Group 2: Temporal Stimulation (Collapsed) -->
                <div class="accordion-header" id="accordion-header-2">
                    <span id="lbl-setting-group-2"></span>
                    <span class="accordion-arrow" id="accordion-arrow-2">›</span>
                </div>
                <div class="accordion-content" id="accordion-content-2">
                    <!-- Flash Exposure Speed Config -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-flash"></label>
                            <select id="select-flash-duration">
                                <option value="adaptive" id="opt-flash-adaptive"></option>
                                <option value="100" id="opt-flash-100"></option>
                                <option value="180" id="opt-flash-180"></option>
                                <option value="200" id="opt-flash-200"></option>
                                <option value="350" id="opt-flash-350"></option>
                            </select>
                        </div>
                        <span class="settings-help" id="help-flash-duration"></span>
                    </div>

                    <!-- Dynamic Stage Autoprogression Toggle -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-stage-advance"></label>
                            <input type="checkbox" id="chk-stage-advance">
                        </div>
                        <span class="settings-help" id="help-stage-advance"></span>
                    </div>

                    <!-- Static Stimulation Mode Toggle -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-static"></label>
                            <input type="checkbox" id="chk-static">
                        </div>
                        <span class="settings-help" id="help-static"></span>
                    </div>

                    <!-- Flicker Stimulation Toggle (Dynamic under Static) -->
                    <div class="settings-row" id="row-flicker" style="flex-direction: column; align-items: flex-start; gap: 4px; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-flicker"></label>
                            <input type="checkbox" id="chk-flicker">
                        </div>
                        <span class="settings-help" id="help-flicker"></span>
                    </div>
                </div>

                <!-- Group 3: Spatial Acuity & Crowding (Collapsed) -->
                <div class="accordion-header" id="accordion-header-3">
                    <span id="lbl-setting-group-3"></span>
                    <span class="accordion-arrow" id="accordion-arrow-3">›</span>
                </div>
                <div class="accordion-content" id="accordion-content-3">
                    <!-- Low Contrast Floor Mode Toggle -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-low-contrast"></label>
                            <input type="checkbox" id="chk-low-contrast">
                        </div>
                        <span class="settings-help" id="help-low-contrast"></span>
                    </div>

                    <!-- Shape & Line Density Randomization Toggle -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-wide-variance"></label>
                            <input type="checkbox" id="chk-wide-variance">
                        </div>
                        <span class="settings-help" id="help-wide-variance"></span>
                    </div>

                    <!-- Peripheral Eccentricity Shift Toggle -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-peripheral"></label>
                            <input type="checkbox" id="chk-peripheral">
                        </div>
                        <span class="settings-help" id="help-peripheral"></span>
                    </div>

                    <!-- Visual Crowding Distractors Toggle -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-crowding"></label>
                            <input type="checkbox" id="chk-crowding">
                        </div>
                        <span class="settings-help" id="help-crowding"></span>
                    </div>

                    <!-- Orthogonal Flankers Orientation Toggle (Dynamic under Crowding) -->
                    <div class="settings-row" id="row-orthogonal" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-orthogonal"></label>
                            <input type="checkbox" id="chk-orthogonal-flankers">
                        </div>
                        <span class="settings-help" id="help-orthogonal"></span>
                    </div>

                    <!-- Dynamic Flanker Phase Shift Toggle (Dynamic under Crowding) -->
                    <div class="settings-row" id="row-dynamic" style="flex-direction: column; align-items: flex-start; gap: 4px; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-dynamic"></label>
                            <input type="checkbox" id="chk-dynamic-flankers">
                        </div>
                        <span class="settings-help" id="help-dynamic"></span>
                    </div>
                </div>

                <!-- Group 4: Binocular 3D Setup (Collapsed) -->
                <div class="accordion-header" id="accordion-header-4">
                    <span id="lbl-setting-group-4"></span>
                    <span class="accordion-arrow" id="accordion-arrow-4">›</span>
                </div>
                <div class="accordion-content" id="accordion-content-4">
                    <!-- Anaglyph 3D Mode Toggle -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label id="lbl-setting-anaglyph"></label>
                            <input type="checkbox" id="chk-anaglyph">
                        </div>
                        <span class="settings-help" id="help-anaglyph"></span>
                    </div>

                    <!-- Interactive calibration panel (Renders as sheet during test) -->
                    <div id="anaglyph-settings-panel" style="display: none; border-top: 1px dashed #2b354a; padding-top: 12px; margin-top: 10px; margin-bottom: 0;">
                        <div class="settings-row">
                            <label id="lbl-setting-red-side"></label>
                            <select id="select-red-side">
                                <option value="left" id="opt-red-left"></option>
                                <option value="right" id="opt-red-right"></option>
                            </select>
                        </div>
                        <div class="settings-row">
                            <label id="lbl-setting-lazy-side"></label>
                            <select id="select-lazy-side">
                                <option value="left" id="opt-lazy-left"></option>
                                <option value="right" id="opt-lazy-right"></option>
                            </select>
                        </div>
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%;">
                                <label id="lbl-setting-strong-attenuation"></label>
                                <span id="val-strong-attenuation" style="color: #3b90ff; font-weight: bold;">30%</span>
                            </div>
                            <input type="range" id="range-strong-attenuation" min="10" max="100" step="5" value="30" style="width: 100%; accent-color: #007aff; cursor: pointer; margin-top: 6px;">
                        </div>

                        <!-- Zero-Disparity Fusion Lock Toggle -->
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label id="lbl-setting-fusion-lock"></label>
                                <input type="checkbox" id="chk-fusion-lock">
                            </div>
                            <span class="settings-help" id="help-fusion-lock"></span>
                        </div>

                        <!-- Left Eye Subpixel Red Balance Slider -->
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <span id="lbl-setting-left-color" style="font-size: 13px; font-weight: 500;"></span>
                                <span id="val-calib-r" style="color: #ef4444; font-weight: bold; font-size: 13px;">255</span>
                            </div>
                            <div style="width: 100%; display: flex; flex-direction: column; gap: 6px; padding-left: 4px;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="width: 12px; font-size: 11px; font-weight: bold; color: #ef4444;">R</span>
                                    <input type="range" id="slider-left-r" min="0" max="255" value="255" style="flex: 1; accent-color: #ef4444; height: 4px; cursor: pointer;">
                                </div>
                            </div>
                        </div>

                        <!-- Right Eye Subpixel Green/Blue Balance Sliders -->
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 8px; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <span id="lbl-setting-right-color" style="font-size: 13px; font-weight: 500;"></span>
                                <div style="display: flex; gap: 8px; font-size: 13px; font-weight: bold;">
                                    <span style="color: #22c55e;">G: <span id="val-calib-g">255</span></span>
                                    <span style="color: #3b82f6;">B: <span id="val-calib-b">255</span></span>
                                </div>
                            </div>
                            <div style="width: 100%; flex-direction: column; gap: 6px; padding-left: 4px;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="width: 12px; font-size: 11px; font-weight: bold; color: #22c55e;">G</span>
                                    <input type="range" id="slider-right-g" min="0" max="255" value="255" style="flex: 1; accent-color: #22c55e; height: 4px; cursor: pointer;">
                                </div>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="width: 12px; font-size: 11px; font-weight: bold; color: #3b82f6;">B</span>
                                    <input type="range" id="slider-right-b" min="0" max="255" value="255" style="flex: 1; accent-color: #3b82f6; height: 4px; cursor: pointer;">
                                </div>
                            </div>
                        </div>

                        <!-- Fusion Alignment Test Launcher Toggle -->
                        <button id="btn-fusion-test" class="close-btn" style="background: #1a233a; border: 1px solid #3b90ff; color: #3b90ff; margin-top: 14px; font-weight: bold;"></button>
                    </div>
                </div>

                <p style="font-size: 11px; color: #8e8e93; line-height: 1.3; margin-top: 15px;" id="desc-mode-explanation"></p>
            </div>

            <button id="btn-close-settings" class="close-btn">OK</button>
        </div>
    </div>

    <!-- Educational Clinical Manual Modal -->
    <div id="info-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            
            <div class="modal-scroll-body">
                <h4 id="sec-about-title"></h4>
                <p id="sec-about-text"></p>

                <h4 id="sec-instructions-title"></h4>
                <ul id="sec-instructions-list"></ul>
                
                <h4 id="sec-levels-title"></h4>
                <ul id="sec-levels-list"></ul>

                <h4 id="sec-presets-title"></h4>
                <ul id="sec-presets-list"></ul>

                <h4 id="sec-recommendations-title"></h4>
                <ul id="sec-recommendations-list"></ul>
            </div>

            <button id="btn-close-modal" class="close-btn">OK</button>
        </div>
    </div>

    <!-- Highscore Stats & History Modal -->
    <div id="stats-modal" class="modal">
        <div class="modal-content">
            <h2 id="stats-title"></h2>
            <div class="modal-scroll-body">
                <div id="leaderboard" style="width: 100%; margin-top: 15px;">
                    <ul id="leaderboard-list"></ul>
                </div>
            </div>
            <button id="btn-close-stats" class="close-btn">OK</button>
        </div>
    </div>

    <!-- External assets dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js"></script>
</body>
</html>
