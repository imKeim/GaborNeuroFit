<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🧿 GaborNeuroFit</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon-DSgW1i4M.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GaborNeuroFit">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#131a26">
  <script type="module" crossorigin src="./assets/index-BFVolZib.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-Daw31yhU.css">
<link rel="manifest" href="./manifest.webmanifest"><script id="vite-plugin-pwa:inline-sw">if('serviceWorker' in navigator) {window.addEventListener('load', () => {navigator.serviceWorker.register('./sw.js', { scope: './' })})}</script></head>
<body>
    <!-- CRITICAL: Fullscreen hardware-accelerated overlay for success/error flash feedback -->
    <div id="flash-overlay"></div>

    <!-- CRITICAL: Prevents mobile landscape layout breaks. Forced via CSS media queries -->
    <div id="rotation-blocker">
        <div id="rotation-text" data-i18n="lblRotationBlock"></div>
    </div>

    <div id="app-wrapper">
        <!-- TOP HUD: Holds main settings and diagnostic triggers -->
        <div id="top-bar">
            <div id="app-title">🧿 GaborNeuroFit</div>
            <div id="top-controls">
                <div id="btn-mute" class="control-btn">🔊</div>
                <div id="btn-info" class="control-btn">ℹ️</div>
                <div id="btn-stats" class="control-btn">📊</div>
                <div id="btn-settings" class="control-btn">🛠️</div>
            </div>
        </div>

        <!-- WORKSPACE: Aspect-ratio locked (1:1) training area. 
             CRITICAL: gaborCanvas (WebGL/CPU) and overlayCanvas (2D Transparent HUD) 
             MUST sit absolutely stacked over each other at 100% width/height. -->
        <div id="workspace">
            <div id="container">
                <div id="cross">+</div>
                <canvas id="gaborCanvas" width="256" height="256"></canvas>
                <canvas id="overlayCanvas" width="256" height="256"></canvas>
                <div id="calibration-curtain"></div> <!-- Local curtain to mask canvas snaps dynamically -->
            </div>
        </div>

        <!-- BOTTOM HUD: Session scoreboard, status descriptors, and user tactile inputs -->
        <div id="bottom-dock">
            <div id="score-board">
                <div id="score-text"></div>
                <div id="indicators">
                    <!-- i18n Engine: Uses data-i18n for secure plain-text content injection (textContent) -->
                    <span class="badge"><span data-i18n="stage"></span>: <span id="current-level">1</span>/5</span>
                    <span class="badge"><span data-i18n="contrast"></span>: <span id="current-contrast">50</span>%</span>
                    <span class="badge"><span data-i18n="streak"></span>: <span id="current-streak">0</span></span>
                    <span id="badge-timer-gabor" class="badge" style="display: none; color: #ef4444; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.12);">🍅 00:00</span>
                </div>
                <!-- Dual Synoptophore Stats Badges (Eliminates layout vibrations) -->
                <div id="synop-indicators" style="display: none; justify-content: center; gap: 6px;">
                    <span id="badge-prism-x" class="badge" style="color: #3b90ff; border-color: rgba(59, 144, 255, 0.3); background: rgba(59, 144, 255, 0.12);">X: 0px (0.00Δ)</span>
                    <span id="badge-prism-y" class="badge" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.12);">Y: 0px (0.00Δ)</span>
                    <span id="badge-synop-score" class="badge" style="color: #eab308; border-color: rgba(234, 179, 8, 0.3); background: rgba(234, 179, 8, 0.12); font-weight: bold;">🏆 0</span>
                    <span id="badge-timer-synop" class="badge" style="display: none; color: #ef4444; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.12);">🍅 00:00</span>
                </div>
                <!-- Dynamic Ocular Vergence Progress Bar (Smooth hardware-accelerated transitions) -->
                <div id="synop-progress-container" style="display: none; width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-top: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.02);">
                    <div id="synop-progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #007aff, #22c55e); transition: width 0.25s cubic-bezier(0.25, 1, 0.5, 1);"></div>
                </div>
            </div>

            <div id="controls-layout">
                <div id="mode-status-bar">
                    <span><span data-i18n="lblActiveMode">Mode</span>: <strong id="val-active-mode" style="color: #007aff;">Classic</strong></span>
                    <span><span data-i18n="lblActiveSpeed">Speed</span>: <strong id="val-active-speed">Adaptive</strong></span>
                </div>
                <!-- CRITICAL: btn-start is dynamically populated procedurally in app.js on load/state change. No static i18n. -->
                <button id="btn-start"></button>
                <div id="action-buttons">
                    <button class="action-btn" id="btn-left">
                        <span>◀</span>
                        <div class="btn-label" data-i18n="leftBtn"></div>
                    </button>
                    <button class="action-btn" id="btn-reset" style="display: none;">
                        <span>🔄</span>
                        <div class="btn-label" data-i18n="resetBtn"></div>
                    </button>
                    <button class="action-btn" id="btn-right">
                        <span>▶</span>
                        <div class="btn-label" data-i18n="rightBtn"></div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- CONFIGURATION PANEL MODAL: Scrollable settings cards -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="settingsTitle"></h2>
            
            <!-- Symmetrical Settings Mode Switcher -->
            <div id="settings-mode-bar" style="display: flex; background: #131a26; padding: 4px; border-radius: 10px; border: 1px solid #2b354a; margin-bottom: 14px; margin-left: auto; margin-right: auto; width: 100%;">
                <button id="settings-tab-gabor" class="tab-btn active" data-i18n="tabGabor" style="flex: 1; border: none; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; background: #2b354a; color: #3b90ff; cursor: pointer; transition: all 0.2s;"></button>
                <button id="settings-tab-synop" class="tab-btn" data-i18n="tabSynop" style="flex: 1; border: none; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; background: transparent; color: #8e8e93; cursor: pointer; transition: all 0.2s;"></button>
            </div>
            
            <div class="modal-scroll-body">
                
                <!-- GROUP 1: Core clinical setup (Default expanded) -->
                <div class="accordion-header" id="accordion-header-1">
                    <span data-i18n="lblSettingGroup1"></span>
                    <span class="accordion-arrow active" id="accordion-arrow-1">›</span>
                </div>
                <div class="accordion-content open" id="accordion-content-1">
                    <div class="settings-row">
                        <label data-i18n="lblSettingLang"></label>
                        <select id="select-lang">
                            <option value="en">🇬🇧 English</option>
                            <option value="ru">🇷🇺 Русский</option>
                        </select>
                    </div>
                    <div class="settings-row" id="row-preset-mode" style="flex-direction: column; align-items: flex-start; gap: 4px; margin-top: 5px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingPreset"></label>
                            <!-- CRITICAL: Always preserve complete closing select tags. Do not truncate brackets. 
                                 Option tags utilize data-i18n for dynamic language injection. -->
                            <select id="select-preset-mode">
                                <option value="occlusion" data-i18n="optPresetOcclusion"></option>
                                <option value="blitz" data-i18n="optPresetBlitz"></option>
                                <option value="binocular" data-i18n="optPresetBinocular"></option>
                                <option value="flicker" data-i18n="optPresetFlicker"></option>
                                <option value="peripheral" data-i18n="optPresetPeripheral"></option>
                                <option value="custom" data-i18n="optPresetCustom"></option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpPresetMode" id="help-preset-mode"></span>
                    </div>
                    <div class="settings-row" id="row-start-level" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingStartLevel"></label>
                            <select id="select-start-level">
                                <option value="1" id="opt-stage-1"></option>
                                <option value="2" id="opt-stage-2"></option>
                                <option value="3" id="opt-stage-3"></option>
                                <option value="4" id="opt-stage-4"></option>
                                <option value="5" id="opt-stage-5"></option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpStartLevel" id="help-start-level"></span>
                    </div>
                    <div class="settings-row" id="row-autonext" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingAutonext"></label>
                            <select id="select-autonext">
                                <option value="true" data-i18n="optAutonextOn"></option>
                                <option value="false" data-i18n="optAutonextOff"></option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpAutonext"></span>
                    </div>
                    <div class="settings-row" id="row-session-limit" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingLimit"></label>
                            <select id="select-session-limit">
                                <option value="0" data-i18n="optLimitOff"></option>
                                <option value="40">40</option>
                                <option value="80">80</option>
                                <option value="120">120</option>
                                <option value="160">160</option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpSessionLimit"></span>
                    </div>
                    <div class="settings-row" style="border-bottom: none; padding-bottom: 0; margin-bottom: 0; flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingTimerLimit"></label>
                            <select id="select-timer-limit">
                                <option value="0" data-i18n="optTimerOff"></option>
                                <option value="5" data-i18n="optTimer5"></option>
                                <option value="10" data-i18n="optTimer10"></option>
                                <option value="15" data-i18n="optTimer15"></option>
                                <option value="20" data-i18n="optTimer20"></option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpTimerLimit"></span>
                    </div>
                </div>

                <!-- GROUP 2: Temporal stimulation pacing (Default collapsed) -->
                <div class="accordion-header" id="accordion-header-2">
                    <span data-i18n="lblSettingGroup2"></span>
                    <span class="accordion-arrow" id="accordion-arrow-2">›</span>
                </div>
                <div class="accordion-content" id="accordion-content-2">
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingFlash"></label>
                            <select id="select-flash-duration">
                                <option value="adaptive" data-i18n="optFlashAdaptive"></option>
                                <option value="100" data-i18n="optFlash100"></option>
                                <option value="180" data-i18n="optFlash180"></option>
                                <option value="200" data-i18n="optFlash200"></option>
                                <option value="350" data-i18n="optFlash350"></option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpFlashDuration" id="help-flash-duration"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingStageAdvance"></label>
                            <input type="checkbox" id="chk-stage-advance">
                        </div>
                        <span class="settings-help" data-i18n="helpStageAdvance" id="help-stage-advance"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingStatic"></label>
                            <input type="checkbox" id="chk-static">
                        </div>
                        <span class="settings-help" data-i18n="helpStatic" id="help-static"></span>
                    </div>
                    <!-- CRITICAL: row-flicker visibility is tied re-actively to chk-static in settings.js -->
                    <div class="settings-row" id="row-flicker" style="flex-direction: column; align-items: flex-start; gap: 4px; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingFlicker"></label>
                            <input type="checkbox" id="chk-flicker">
                        </div>
                        <span class="settings-help" data-i18n="helpFlicker" id="help-flicker"></span>
                    </div>
                </div>

                <!-- GROUP 3: Spatial configuration & anti-crowding (Default collapsed) -->
                <div class="accordion-header" id="accordion-header-3">
                    <span data-i18n="lblSettingGroup3"></span>
                    <span class="accordion-arrow" id="accordion-arrow-3">›</span>
                </div>
                <div class="accordion-content" id="accordion-content-3">
                    <!-- Permanent Cross Anchor -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingPermanentCross" for="chk-permanent-cross"></label>
                            <input type="checkbox" id="chk-permanent-cross">
                        </div>
                        <span class="settings-help" data-i18n="helpPermanentCross" id="help-permanent-cross"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingLowContrast"></label>
                            <input type="checkbox" id="chk-low-contrast">
                        </div>
                        <span class="settings-help" data-i18n="helpLowContrast" id="help-low-contrast"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingWideVariance"></label>
                            <input type="checkbox" id="chk-wide-variance">
                        </div>
                        <span class="settings-help" data-i18n="helpWideVariance" id="help-wide-variance"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingShapeVariance"></label>
                            <input type="checkbox" id="chk-shape-variance">
                        </div>
                        <span class="settings-help" data-i18n="helpShapeVariance" id="help-shape-variance"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingPeripheral"></label>
                            <input type="checkbox" id="chk-peripheral">
                        </div>
                        <span class="settings-help" data-i18n="helpPeripheral" id="help-peripheral"></span>
                    </div>
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingCrowding"></label>
                            <input type="checkbox" id="chk-crowding">
                        </div>
                        <span class="settings-help" data-i18n="helpCrowding" id="help-crowding"></span>
                    </div>
                    <div class="settings-row" id="row-crowding-mode" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingCrowdingMode"></label>
                            <select id="select-crowding-mode">
                                <option value="vertical" data-i18n="optCrowdingVertical"></option>
                                <option value="horizontal" data-i18n="optCrowdingHorizontal"></option>
                                <option value="all" data-i18n="optCrowdingAll"></option>
                            </select>
                        </div>
                    </div>
                    <!-- CRITICAL: row-orthogonal and row-dynamic visibility/opacities are tied re-actively to chk-crowding in settings.js -->
                    <div class="settings-row" id="row-orthogonal" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingOrthogonal"></label>
                            <input type="checkbox" id="chk-orthogonal-flankers">
                        </div>
                        <span class="settings-help" data-i18n="helpOrthogonal" id="help-orthogonal"></span>
                    </div>
                    <div class="settings-row" id="row-dynamic" style="flex-direction: column; align-items: flex-start; gap: 4px; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingDynamic"></label>
                            <input type="checkbox" id="chk-dynamic-flankers">
                        </div>
                        <span class="settings-help" data-i18n="helpDynamic" id="help-dynamic"></span>
                    </div>
                </div>

                <!-- GROUP 4: Binocular 3D Setup & sub-pixel RGB sliders -->
                <div class="accordion-header" id="accordion-header-4">
                    <span data-i18n="lblSettingGroup4"></span>
                    <span class="accordion-arrow" id="accordion-arrow-4">›</span>
                </div>
                <div class="accordion-content" id="accordion-content-4">
                    <div class="settings-row" id="row-anaglyph-toggle" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingAnaglyph"></label>
                            <input type="checkbox" id="chk-anaglyph">
                        </div>
                        <span class="settings-help" data-i18n="helpAnaglyph" id="help-anaglyph"></span>
                    </div>

                    <!-- CRITICAL: anaglyph-settings-panel opacity and disabled states are controlled re-actively by chk-anaglyph in settings.js -->
                    <div id="anaglyph-settings-panel" style="border-top: 1px dashed #2b354a; padding-top: 12px; margin-top: 10px; margin-bottom: 0;">
                        <div class="settings-row">
                            <label data-i18n="lblSettingRedSide"></label>
                            <select id="select-red-side">
                                <option value="left" data-i18n="optSideLeft"></option>
                                <option value="right" data-i18n="optSideRight"></option>
                            </select>
                        </div>
                        <div class="settings-row">
                            <label data-i18n="lblSettingLazySide"></label>
                            <select id="select-lazy-side">
                                <option value="left" data-i18n="optSideLeft"></option>
                                <option value="right" data-i18n="optSideRight"></option>
                            </select>
                        </div>
                        <div class="settings-row" id="row-strong-attenuation" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%;">
                                <label data-i18n="lblSettingStrongAttenuation"></label>
                                <span id="val-strong-attenuation" style="color: #3b90ff; font-weight: bold;">30%</span>
                            </div>
                            <div class="slider-row" style="display: flex; align-items: center; width: 100%; gap: 8px;">
                                <button class="nudge-btn" data-nudge-target="range-strong-attenuation" data-nudge-step="5" data-nudge-dir="-1">−</button>
                                <input type="range" id="range-strong-attenuation" min="10" max="100" step="5" value="30" style="flex: 1; accent-color: #007aff; cursor: pointer; margin-top: 6px;">
                                <button class="nudge-btn" data-nudge-target="range-strong-attenuation" data-nudge-step="5" data-nudge-dir="1">+</button>
                            </div>
                        </div>
                        <div class="settings-row" id="row-fusion-lock" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <label data-i18n="lblSettingFusionLock"></label>
                                <input type="checkbox" id="chk-fusion-lock">
                            </div>
                            <span class="settings-help" data-i18n="helpFusionLock" id="help-fusion-lock"></span>
                        </div>
                        <!-- Left Lens Calibration (Subpixel Red balance) -->
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <!-- i18n-html: Used for rendering translated nodes that contain embedded rich html tags (like <br>) -->
                                <span data-i18n-html="lblSettingLeftColor" style="font-size: 13px; font-weight: 500;"></span>
                                <span id="val-calib-r" style="color: #ef4444; font-weight: bold; font-size: 13px;">255</span>
                            </div>
                            <div class="slider-row">
                                    <span style="width: 12px; font-size: 11px; font-weight: bold; color: #ef4444;">R</span>
                                    <button class="nudge-btn" data-nudge-target="slider-left-r" data-nudge-step="1" data-nudge-dir="-1">−</button>
                                    <input type="range" id="slider-left-r" min="0" max="255" value="255" style="--slider-thumb-color: #ef4444; flex: 1; height: 4px; cursor: pointer;">
                                    <button class="nudge-btn" data-nudge-target="slider-left-r" data-nudge-step="1" data-nudge-dir="1">+</button>
                            </div>
                        </div>
                        <!-- Right Lens Calibration (Subpixel Green/Blue balance) -->
                        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 8px; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <span data-i18n-html="lblSettingRightColor" style="font-size: 13px; font-weight: 500;"></span>
                                <div style="display: flex; gap: 8px; font-size: 13px; font-weight: bold;">
                                    <span style="color: #22c55e;">G: <span id="val-calib-g">255</span></span>
                                    <span style="color: #3b82f6;">B: <span id="val-calib-b">255</span></span>
                                </div>
                            </div>
                            <div style="width: 100%; display: flex; flex-direction: column; gap: 6px; padding-left: 4px;">
                                <div class="slider-row">
                                    <span style="width: 12px; font-size: 11px; font-weight: bold; color: #22c55e;">G</span>
                                    <button class="nudge-btn" data-nudge-target="slider-right-g" data-nudge-step="1" data-nudge-dir="-1">−</button>
                                    <input type="range" id="slider-right-g" min="0" max="255" value="255" style="--slider-thumb-color: #22c55e; flex: 1; height: 4px; cursor: pointer;">
                                    <button class="nudge-btn" data-nudge-target="slider-right-g" data-nudge-step="1" data-nudge-dir="1">+</button>
                                </div>
                                <div class="slider-row">
                                    <span style="width: 12px; font-size: 11px; font-weight: bold; color: #3b82f6;">B</span>
                                    <button class="nudge-btn" data-nudge-target="slider-right-b" data-nudge-step="1" data-nudge-dir="-1">−</button>
                                    <input type="range" id="slider-right-b" min="0" max="255" value="255" style="--slider-thumb-color: #3b82f6; flex: 1; height: 4px; cursor: pointer;">
                                    <button class="nudge-btn" data-nudge-target="slider-right-b" data-nudge-step="1" data-nudge-dir="1">+</button>
                                </div>
                            </div>
                        </div>
                        <button id="btn-fusion-test" class="close-btn" data-i18n="btnFusionTestLabel" style="background: #1a233a; border: 1px solid #3b90ff; color: #3b90ff; margin-top: 14px; font-weight: bold;"></button>
                    </div>
                </div>

                <!-- GROUP 5: Synoptophore Settings (Default collapsed) -->
                <div class="accordion-header" id="accordion-header-5">
                    <span data-i18n="lblSettingGroup5"></span>
                    <span class="accordion-arrow" id="accordion-arrow-5">›</span>
                </div>
                <div class="accordion-content" id="accordion-content-5">
                    <!-- Ocular Pulling Speed Row -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingPullSpeed"></label>
                            <select id="select-pull-speed">
                                <option value="3500">1 px / 3.5s</option>
                                <option value="2500" selected>1 px / 2.5s</option>
                                <option value="1500">1 px / 1.5s</option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpSynopPullSpeed"></span>
                    </div>
                    <!-- Ophthalmic Target Size Selector Row -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingTargetSize"></label>
                            <select id="select-target-size">
                                <option value="65" data-i18n="optSizeMacular"></option>
                                <option value="45" data-i18n="optSizeParamacular"></option>
                                <option value="30" data-i18n="optSizeFoveal"></option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpTargetSize"></span>
                    </div>
                    <!-- Synoptophore Resonant 10 Hz Flicker Row -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingSynopFlicker" for="chk-synop-flicker"></label>
                            <input type="checkbox" id="chk-synop-flicker">
                        </div>
                        <span class="settings-help" data-i18n="helpSynopFlicker"></span>
                    </div>
                    <!-- Target Geometry Type Row -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingTargetType"></label>
                            <select id="select-target-type">
                                <option value="ring-dot" data-i18n="optTargetRing"></option>
                                <option value="cross-square" data-i18n="optTargetSquare"></option>
                            </select>
                        </div>
                        <span class="settings-help" data-i18n="helpTargetType"></span>
                    </div>
                    <!-- Horizontal Strict Lock Row -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingSynopLockY" for="chk-synop-lock-y"></label>
                            <input type="checkbox" id="chk-synop-lock-y">
                        </div>
                        <span class="settings-help" data-i18n="helpSynopLockY"></span>
                    </div>
                    <!-- Vertical Strict Lock Row -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingSynopLockX" for="chk-synop-lock-x"></label>
                            <input type="checkbox" id="chk-synop-lock-x">
                        </div>
                        <span class="settings-help" data-i18n="helpSynopLockX"></span>
                    </div>
                    <!-- Lazy Eye Target Alignment Grid (Dashed Visir) Row -->
                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingSynopLazyGrid" for="chk-synop-lazy-grid"></label>
                            <input type="checkbox" id="chk-synop-lazy-grid">
                        </div>
                        <span class="settings-help" data-i18n="helpSynopLazyGrid"></span>
                    </div>
                    <!-- Strong Eye Target Alignment Grid (Dashed Visir) Row -->
                    <div class="settings-row" style="border-bottom: none; padding-bottom: 0; margin-bottom: 0; flex-direction: column; align-items: flex-start; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <label data-i18n="lblSettingSynopStrongGrid" for="chk-synop-strong-grid"></label>
                            <input type="checkbox" id="chk-synop-strong-grid">
                        </div>
                        <span class="settings-help" data-i18n="helpSynopStrongGrid"></span>
                    </div>
                </div>

                <p style="font-size: 11px; color: #8e8e93; line-height: 1.3; margin-top: 15px;" data-i18n="descModeExplanation" id="desc-mode-explanation"></p>
            </div>

            <button id="btn-close-settings" class="close-btn">OK</button>
        </div>
    </div>

    <!-- CUSTOM NON-BLOCKING ALERT DIALOG -->
    <div id="custom-alert-modal" class="modal" style="z-index: 3000;">
        <div class="modal-content" style="height: auto; max-height: 320px; width: 88%; max-width: 420px; text-align: center; border-radius: var(--border-radius-elements); padding: 20px;">
            <h2 id="custom-alert-title" style="margin-top: 0; margin-bottom: 12px; font-size: 16px; color: #eab308; font-weight: 700;">GaborNeuroFit</h2>
            <div class="modal-scroll-body" style="font-size: 12px; color: #cbd5e1; line-height: 1.45; text-align: center; margin-bottom: 12px; padding: 0 4px;">
                <p id="custom-alert-text" style="margin: 0;"></p>
            </div>
            <button id="btn-close-custom-alert" class="close-btn" style="margin-top: 0; padding: 8px;">OK</button>
        </div>
    </div>

    <!-- CUSTOM NON-BLOCKING CONFIRMATION DIALOG -->
    <div id="custom-confirm-modal" class="modal" style="z-index: 3010;">
        <div class="modal-content" style="height: auto; max-height: 320px; width: 88%; max-width: 420px; text-align: center; border-radius: var(--border-radius-elements); padding: 20px;">
            <h2 id="custom-confirm-title" style="margin-top: 0; margin-bottom: 12px; font-size: 16px; color: #ef4444; font-weight: 700;">GaborNeuroFit</h2>
            <div class="modal-scroll-body" style="font-size: 12px; color: #cbd5e1; line-height: 1.45; text-align: center; margin-bottom: 12px; padding: 0 4px;">
                <p id="custom-confirm-text" style="margin: 0;"></p>
            </div>
            <div style="display: flex; gap: 10px; width: 100%;">
                <button id="btn-confirm-yes" class="close-btn" style="flex: 1; margin-top: 0; padding: 8px; background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.25); color: #ef4444; font-weight: bold;">Yes</button>
                <button id="btn-confirm-no" class="close-btn" style="flex: 1; margin-top: 0; padding: 8px; background: #2b354a; font-weight: bold;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- INFO HANDBOOK MODAL -->
    <div id="info-modal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="modalTitle"></h2>
            <div class="modal-scroll-body">
                <h4 data-i18n="secAboutTitle"></h4>
                <p data-i18n-html="secAboutText"></p>
                <h4 data-i18n="secInstructionsTitle"></h4>
                <ul data-i18n-html="secInstructionsText" id="sec-instructions-list"></ul>
                <h4 data-i18n="secLevelsTitle"></h4>
                <ul data-i18n-html="secLevelsList" id="sec-levels-list"></ul>
                <h4 data-i18n="secPresetsTitle"></h4>
                <ul data-i18n-html="secPresetsText" id="sec-presets-list"></ul>
                <h4 data-i18n="secRecommendationsTitle"></h4>
                <ul data-i18n-html="secRecommendationsText" id="sec-recommendations-list"></ul>
            </div>
            <button id="btn-close-modal" class="close-btn">OK</button>
        </div>
    </div>

    <!-- HISTORICAL LEADERBOARD MODAL (Relational Multi-User Clinical Dashboard v2.5.0) -->
    <div id="stats-modal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="statsTitle"></h2>
            <div class="modal-scroll-body">
                <!-- Profile Selector Row -->
                <div class="settings-row" style="margin-top: 5px;">
                    <label data-i18n="lblActiveProfile" for="select-active-profile"></label>
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <span id="active-profile-emoji" style="font-size: 18px; line-height: 1;">👤</span>
                        <select id="select-active-profile" style="max-width: 60%; min-width: 140px;"></select>
                    </div>
                </div>

                <!-- New Profile Input Row -->
                <div class="settings-row" style="border-bottom: none; margin-bottom: 4px; padding-bottom: 0;">
                    <input type="text" id="input-new-profile" data-i18n-placeholder="placeholderNewProfile" style="width: 100%; background: #131a26; color: #fff; border: 1px solid #2b354a; border-radius: 8px; padding: 10px; font-size: 13px; outline: none;" placeholder="Enter Name...">
                </div>

                <!-- Profile Management Buttons Grid -->
                <div style="display: flex; gap: 10px; margin-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 14px;">
                    <button id="btn-add-profile" class="close-btn" data-i18n="btnAddProfile" style="flex: 1; margin-top: 0; background: rgba(0, 122, 255, 0.12); border: 1px solid rgba(0, 122, 255, 0.25); color: #3b90ff; padding: 10px; font-size: 12px; font-weight: bold;"></button>
                    <button id="btn-delete-profile" class="close-btn" data-i18n="btnDeleteProfile" style="flex: 1; margin-top: 0; background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.25); color: #ef4444; padding: 10px; font-size: 12px; font-weight: bold;"></button>
                </div>

                <!-- Symmetrical Tab Segmented Pill Control -->
                <div id="stats-tab-bar" style="display: flex; background: #131a26; padding: 4px; border-radius: 10px; border: 1px solid #2b354a; margin-bottom: 14px;">
                    <button id="tab-gabor" class="tab-btn active" data-i18n="tabGabor" style="flex: 1; border: none; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; background: #2b354a; color: #3b90ff; cursor: pointer; transition: all 0.2s;"></button>
                    <button id="tab-synop" class="tab-btn" data-i18n="tabSynop" style="flex: 1; border: none; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; background: transparent; color: #8e8e93; cursor: pointer; transition: all 0.2s;"></button>
                </div>

                <!-- GABOR SENSORY TRAINING VIEWPORT -->
                <div id="tab-gabor-content" style="display: block;">
                    <!-- Procedural SVG Progress Chart -->
                    <div id="progress-chart-container" style="width: 100%; height: 130px; background: rgba(11, 15, 24, 0.3); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.04); display: flex; align-items: center; justify-content: center; padding: 10px; margin-bottom: 6px; box-sizing: border-box;">
                        <!-- SVG Gabor chart dynamically injected by screen.js -->
                    </div>

	                <!-- Progress Chart Descriptive Legend Info -->
	                <div style="margin-top: 0; margin-bottom: 14px; text-align: center; line-height: 1.15; padding: 0 10px;">
	                    <span data-i18n="chartLegend" style="font-size: 11px; color: #8e8e93; font-weight: 300; letter-spacing: 0.2px;"></span>
	                </div>

                    <!-- Chronological Sessions List -->
                    <div id="leaderboard" style="width: 100%; margin-top: 0; margin-bottom: 14px;">
                        <ul id="leaderboard-list"></ul>
                    </div>
                </div>

                <!-- SYNOPTOPHORE MOTOR VERGENCE VIEWPORT -->
                <div id="tab-tab-synop-content" style="display: none;">
                    <!-- Procedural SVG Synop Deviation Chart -->
                    <div id="synop-chart-container" style="width: 100%; height: 130px; background: rgba(11, 15, 24, 0.3); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.04); display: flex; align-items: center; justify-content: center; padding: 10px; margin-bottom: 6px; box-sizing: border-box;">
                        <!-- SVG Synop chart dynamically injected by screen.js -->
                    </div>

                    <!-- Progress Chart Descriptive Legend Info for Synoptophore -->
                    <div style="margin-top: 0; margin-bottom: 14px; text-align: center; line-height: 1.15; padding: 0 10px;">
                        <span data-i18n="synopChartLegend" style="font-size: 11px; color: #8e8e93; font-weight: 300; letter-spacing: 0.2px;"></span>
                    </div>

                    <!-- Chronological Synoptophore Sessions List -->
                    <div id="synop-leaderboard" style="width: 100%; margin-top: 0; margin-bottom: 14px; background: rgba(11, 15, 24, 0.3); border-radius: 12px; padding: 10px 14px; font-size: 13px; color: #cbd5e1; border: 1px solid rgba(255, 255, 255, 0.04);">
                        <ul id="leaderboard-list-synop" style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; height: 100%; overflow-y: auto; scrollbar-width: none;"></ul>
                    </div>
                </div>

                <!-- Bottom Management Grid -->
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="btn-export-csv" class="close-btn" data-i18n="btnExportCSV" style="flex: 1; margin-top: 0; background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94, 0.25); color: #22c55e; padding: 10px; font-size: 12px; font-weight: bold;"></button>
                    <button id="btn-clear-history" class="close-btn" data-i18n="btnClearHistory" style="flex: 1; margin-top: 0; background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.25); color: #ef4444; padding: 10px; font-size: 12px; font-weight: bold;"></button>
                </div>
            </div>
            <button id="btn-close-stats" class="close-btn">OK</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js"></script>
</body>
</html>
