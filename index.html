<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--
      @clinical Viewport Lock
      Prevents accidental pinch-to-zoom which would fundamentally destroy the 
      calibrated spatial frequency (cycles per degree) of the Gabor targets.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>GaborNeuroFit — Vision Therapy Suite</title>
    <meta name="description" content="Professional web-app for Amblyopia (Lazy Eye) treatment, Strabismus rehabilitation, and Contrast Sensitivity training using Gabor patches and Stereograms.">
    <meta name="keywords" content="Amblyopia, Lazy Eye, Vision Therapy, Gabor Patches, Synoptophore, Stereogram, Strabismus treatment">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Block: PWA & Mobile Install Manifests -->
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GaborNeuroFit">
    <link class="apple-touch-icon" href="icon-192-maskable.png">
    <meta name="theme-color" content="#131a26">
</head>
<body>
    <div id="vue-root"></div>
    <!--
      @clinical Fullscreen Consolidation Layer
      Placed at the root body level to guarantee absolute 100% viewport coverage.
      Delivers instantaneous positive/negative visual reinforcement safely via color
      temperature, avoiding startle reflexes associated with sudden brightness changes.
    -->
    <div id="flash-overlay" aria-hidden="true"></div>

    <!--
      @clinical Posture & Orientation Shield
      Forces portrait mode anatomically. Landscape viewing dramatically distorts
      the 1:1 foveal isolation square and breaks comfortable 50-70cm ergonomic working distance.
    -->
    <div id="rotation-blocker" aria-hidden="true">
        <div id="rotation-text" data-i18n="lblRotationBlock"></div>
    </div>

    <!-- Block: App Shell (Main Application UI) -->
    <div id="app-wrapper">

        <!-- Section: Top HUD Navigation & Trigger Panel -->
        <header id="top-bar" role="banner">
            <h1 id="app-title" aria-label="Gabor Neuro Fit">🧿 GaborNeuroFit</h1>

            <nav id="top-controls" aria-label="Application Tools">
                <button id="btn-mute" class="control-btn" data-hint="hintBtnMute" aria-label="Toggle Sound">🔊</button>
                <button id="btn-pause" class="control-btn" data-hint="hintBtnPause" aria-label="Pause Session">⏸️</button>
                <button id="btn-info" class="control-btn" data-hint="hintBtnInfo" aria-label="Clinical Handbook">ℹ️</button>
                <button id="btn-stats" class="control-btn" data-hint="hintBtnStats" aria-label="Patient Dashboard">📊</button>
                <button id="btn-settings" class="control-btn" data-hint="hintBtnSettings" aria-label="Therapy Settings">🛠️</button>
            </nav>
        </header>

        <!-- Section: Clinical Foveation Workspace -->
        <main id="workspace" role="main" aria-label="Visual Stimulation Arena">
            <!--
              @clinical Aspect-Ratio 1:1 Container
              Strictly locked to a perfect square. Ensures mathematical circularity of the Gabor
              Gaussian envelope. Deformation here would ruin the spatial frequency calculations.
            -->
            <div id="container">
                <!-- Logic: GPU Hardware-Accelerated Bottom Layer (WebGL) -->
                <canvas id="gaborCanvas" width="256" height="256" aria-hidden="true"></canvas>
                <!-- Logic: HUD Transparent Top Layer (Canvas 2D) -->
                <canvas id="overlayCanvas" width="256" height="256" aria-hidden="true"></canvas>

                <!-- Logic: Protective Rest Shutter (Melts dynamically to avoid visual shock) -->
                <div id="calibration-curtain" class="active" aria-hidden="true"></div>

                <div id="pause-watermark" data-i18n="pauseWatermark" aria-hidden="true"></div>

                <!--
                  @clinical Foveal Anchor (Fixation Cross)
                  Crucial for controlling eccentric fixation. Patients must look strictly here
                  and resolve targets in their para-fovea to trigger true neurological plasticity.
                -->
                <div id="cross" class="cross-dimmed" aria-hidden="true">
                    <div class="cross-line-h"></div>
                    <div class="cross-line-v"></div>
                </div>
            </div>
        </main>

        <!-- Section: Telemetry, Biofeedback & Input Deck -->
        <footer id="bottom-dock">

            <!--
              @clinical Live Telemetry Board
              Uses aria-live="polite" to gently announce score changes to visually impaired
              patients via VoiceOver / TalkBack without interrupting the flow.
            -->
            <section id="score-board" aria-live="polite" aria-atomic="true">
                <div id="score-text"></div>

                <!-- View: Gabor Badges -->
                <div id="indicators">
                    <span class="badge badge--success"><span><span data-i18n="stage">Stage</span>: <span id="current-level">1</span>/5</span></span>
                    <span class="badge badge--info"><span><span data-i18n="contrast">Contrast</span>: <span id="current-contrast">50</span>%</span></span>
                    <span id="badge-gabor-streak" class="badge badge--warning">🔥<strong id="val-gabor-streak">0</strong></span>
                    <span id="badge-timer-gabor" class="badge badge--danger" style="display: none;">🍅<strong id="val-timer-gabor">00:00</strong></span>
                </div>

                <!-- View: Synoptophore Badges -->
                <div id="synop-indicators" class="indicators-panel">
                    <span id="badge-prism-x" class="badge badge--info"><span>X: 0px (0.00Δ)</span></span>
                    <span id="badge-prism-y" class="badge badge--danger"><span>Y: 0px (0.00Δ)</span></span>
                    <span id="badge-synop-score" class="badge badge--warning">🏆<strong id="val-synop-score">0</strong></span>
                    <span id="badge-timer-synop" class="badge badge--danger" style="display: none;">🍅<strong id="val-timer-synop">00:00</strong></span>
                </div>

                <!-- View: RDS Badges -->
                <div id="rds-indicators" class="indicators-panel">
                    <span id="badge-rds-level" class="badge badge--success"><span>Stage: 1/5</span></span>
                    <span id="badge-rds-disparity" class="badge badge--info"><span>Depth: 4px</span></span>
                    <span id="badge-rds-streak" class="badge badge--warning">🔥<strong id="val-rds-streak">0</strong></span>
                    <span id="badge-timer-rds" class="badge badge--danger" style="display: none;">🍅<strong id="val-timer-rds">00:00</strong></span>
                </div>

                <!-- View: Dynamic Ocular Vergence Progress Bar -->
                <div id="synop-progress-container" class="progress-container" aria-hidden="true">
                    <div id="synop-progress-bar" class="progress-bar"></div>
                </div>
            </section>

            <!-- Section: Tactile Input Deck -->
            <section id="controls-layout" aria-label="Therapy Controls">
                <!-- Logic: Active Template & Temporal Constraints -->
                <div id="mode-status-bar" aria-hidden="true">
                    <div class="status-content">
                        <span><span data-i18n="lblActiveMode">Mode</span>: <strong id="val-active-mode" style="color: #007aff;">Classic</strong></span>
                        <span><span data-i18n="lblActiveSpeed">Speed</span>: <strong id="val-active-speed">Adaptive</strong></span>
                    </div>
                    <div id="status-hint"></div>
                </div>

                <!-- Logic: Primary Trigger (Operated strictly by State Machines via Typescript Injection) -->
                <button type="button" id="btn-start" data-hint="hintBtnStart" aria-label="Execute Primary Action"></button>

                <!-- Logic: Motor/Sensory Switcharoos -->
                <div id="action-buttons">
                    <button type="button" class="action-btn" id="btn-left" data-hint="hintBtnLeft" aria-label="Choose Left">
                        <span>◀</span>
                        <div class="btn-label" data-i18n="leftBtn">Left</div>
                    </button>
                    <button type="button" class="action-btn" id="btn-reset" data-hint="hintBtnReset" aria-label="Reset Coordinates" style="display: none;">
                        <span>🔄</span>
                        <div class="btn-label" data-i18n="resetBtn">Reset</div>
                    </button>
                    <button type="button" class="action-btn" id="btn-right" data-hint="hintBtnRight" aria-label="Choose Right">
                        <span>▶</span>
                        <div class="btn-label" data-i18n="rightBtn">Right</div>
                    </button>
                </div>
            </section>

        </footer>

    </div> <!-- Close #app-wrapper -->

    <!-- 
      Block: Portal Layer Architecture
      All dialogs are hoisted completely out of the App Shell DOM flow.
      This prevents Cumulative Layout Shifts (CLS) upon dialog rendering and
      guarantees absolute Z-Index supremacy over the WebGL Canvas context.
    -->
    <aside id="modal-layer">

        <!-- View: Alert Dialog -->
        <div id="custom-alert-modal" class="modal modal--alert" role="alertdialog" aria-modal="true" aria-labelledby="custom-alert-title" aria-describedby="custom-alert-text" tabindex="-1">
            <div class="modal-content modal-content--compact">
                <h2 id="custom-alert-title" class="modal-title--compact" style="color: #eab308;">GaborNeuroFit</h2>
                <div class="modal-scroll-body modal-scroll-body--compact">
                    <p id="custom-alert-text" style="margin: 0;"></p>
                </div>
                <button type="button" id="btn-close-custom-alert" class="close-btn close-btn--compact">OK</button>
            </div>
        </div>

        <!-- View: Confirmation Dialog -->
        <div id="custom-confirm-modal" class="modal modal--confirm" role="dialog" aria-modal="true" aria-labelledby="custom-confirm-title" aria-describedby="custom-confirm-text" tabindex="-1">
            <div class="modal-content modal-content--compact">
                <h2 id="custom-confirm-title" class="modal-title--compact" style="color: #ef4444;">GaborNeuroFit</h2>
                <div class="modal-scroll-body modal-scroll-body--compact">
                    <p id="custom-confirm-text" style="margin: 0;"></p>
                </div>
                <div class="confirm-btn-group">
                    <button type="button" id="btn-confirm-yes" class="close-btn confirm-btn-yes" data-i18n="confirmYes">Yes</button>
                    <button type="button" id="btn-confirm-no" class="close-btn confirm-btn-no" data-i18n="confirmNo">Cancel</button>
                </div>
            </div>
        </div>

        <!-- View: Clinical Handbook -->
        <div id="info-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" tabindex="-1">
            <div class="modal-content">
                <h2 id="modalTitle" data-i18n="modalTitle"></h2>
                <div class="modal-scroll-body" tabindex="0">
                    <h4 data-i18n="infoAboutTitle"></h4>
                    <p data-i18n-html="infoAboutText"></p>

                    <h4 data-i18n="infoGaborTitle"></h4>
                    <ul data-i18n-html="infoGaborText" id="info-gabor-list"></ul>

                    <h4 data-i18n="infoSynopTitle"></h4>
                    <ul data-i18n-html="infoSynopText" id="info-synop-list"></ul>

                    <h4 data-i18n="infoRdsTitle"></h4>
                    <ul data-i18n-html="infoRdsText" id="info-rds-list"></ul>

                    <h4 data-i18n="infoSafetyTitle"></h4>
                    <ul data-i18n-html="infoSafetyText" id="info-safety-list"></ul>
                </div>
                <button type="button" id="btn-close-modal" class="close-btn">OK</button>
            </div>
        </div>

        <!-- View: Analytics Dashboard -->
        <div id="stats-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="statsTitle" tabindex="-1">
            <div class="modal-content">
                <h2 id="statsTitle" data-i18n="statsTitle"></h2>
                <div class="modal-scroll-body" tabindex="0">

                    <!-- Profile Selector Row -->
                    <div class="settings-row u-mt-xs">
                        <label data-i18n="lblActiveProfile" for="select-active-profile"></label>
                        <select id="select-active-profile" class="profile-select"></select>
                    </div>

                    <!-- New Profile Input & Add Form (Systemic HTML5 keypress submission) -->
                    <form id="form-add-profile" class="profile-form">
                        <!-- New Profile Input Row -->
                        <div class="settings-row profile-input-row">
                            <input type="text" id="input-new-profile" class="dash-input" data-i18n-placeholder="placeholderNewProfile" aria-label="New Patient Profile Name" placeholder="">
                        </div>

                        <!-- Profile Management Buttons Grid -->
                        <div class="profile-btn-group">
                            <button type="submit" id="btn-add-profile" class="dash-btn btn-ghost-blue" data-i18n="btnAddProfile"></button>
                            <button type="button" id="btn-delete-profile" class="dash-btn btn-ghost-red" data-i18n="btnDeleteProfile"></button>
                        </div>
                    </form>

                    <!-- Global Database Backup/Restore & Wipe Grid (Profile Level Actions) -->
                    <div class="db-actions-group">
                        <button type="button" id="btn-export-csv" class="dash-btn btn-ghost-green" data-i18n="btnExportCSV"></button>
                        <button type="button" id="btn-import-csv" class="dash-btn btn-ghost-blue" data-i18n="btnImportCSV"></button>
                        <input type="file" id="input-import-csv" accept=".csv" aria-label="Import CSV" style="display: none;">
                        <button type="button" id="btn-clear-history" class="dash-btn btn-ghost-red" data-i18n="btnClearHistory"></button>
                    </div>

                    <!-- Symmetrical Divider separating Global Profile Actions from Analytics -->
                    <hr class="dashed-divider" aria-hidden="true">

                    <!-- Symmetrical Tab Segmented Pill Control (3-Tab config) -->
                    <nav id="stats-tab-bar" class="modal-tab-bar" aria-label="Statistics Categories">
                        <button type="button" id="tab-gabor" class="tab-btn active">
                            <span class="tab-btn-icon">🧿</span>
                            <span class="tab-btn-text" data-i18n="tabGabor"></span>
                        </button>
                        <button type="button" id="tab-synop" class="tab-btn">
                            <span class="tab-btn-icon">🧲</span>
                            <span class="tab-btn-text" data-i18n="tabSynop"></span>
                        </button>
                        <button type="button" id="tab-rds" class="tab-btn">
                            <span class="tab-btn-icon">🧊</span>
                            <span class="tab-btn-text" data-i18n="tabRDS"></span>
                        </button>
                    </nav>

                    <!-- Gabor Sensory Training Viewport -->
                    <div id="tab-gabor-content" role="region" aria-label="Gabor Training History" style="display: block;">
                        <!-- Procedural SVG Progress Chart -->
                        <div id="progress-chart-container" class="chart-card" aria-hidden="true">
                            <!-- SVG injected by screen.ts -->
                        </div>

                        <!-- Progress Chart Descriptive Legend Info -->
                        <div class="chart-legend-wrapper">
                            <span data-i18n-html="chartLegend" style="font-size: 11px; color: #8e8e93; font-weight: 300; letter-spacing: 0.2px;"></span>
                        </div>

                        <!-- Chronological Sessions List -->
                        <div class="leaderboard-container" tabindex="0">
                            <ul id="leaderboard-list" class="leaderboard-list" aria-label="Gabor Sessions List"></ul>
                        </div>
                    </div>

                    <!-- Synoptophore Motor Vergence Viewport -->
                    <div id="tab-tab-synop-content" role="region" aria-label="Synoptophore Training History" style="display: none;">
                        <!-- Procedural SVG Synop Deviation Chart -->
                        <div id="synop-chart-container" class="chart-card" aria-hidden="true">
                            <!-- SVG injected by screen.ts -->
                        </div>

                        <!-- Progress Chart Descriptive Legend Info for Synoptophore -->
                        <div class="chart-legend-wrapper">
                            <span data-i18n-html="synopChartLegend" style="font-size: 11px; color: #8e8e93; font-weight: 300; letter-spacing: 0.2px;"></span>
                        </div>

                        <!-- Chronological Synoptophore Sessions List -->
                        <div class="leaderboard-container" tabindex="0">
                            <ul id="leaderboard-list-synop" class="leaderboard-list" aria-label="Synoptophore Sessions List"></ul>
                        </div>
                    </div>

                    <!-- Stereopsis Training Viewport -->
                    <div id="tab-rds-content" role="region" aria-label="Stereogram Training History" style="display: none;">
                        <!-- Procedural SVG Stereopsis Progress Chart -->
                        <div id="rds-chart-container" class="chart-card" aria-hidden="true">
                            <!-- SVG injected by screen.ts -->
                        </div>

                        <!-- Progress Chart Descriptive Legend Info for RDS -->
                        <div class="chart-legend-wrapper">
                            <span data-i18n-html="rdsChartLegend" style="font-size: 11px; color: #8e8e93; font-weight: 300; letter-spacing: 0.2px;"></span>
                        </div>

                        <!-- Chronological RDS Sessions List -->
                        <div class="leaderboard-container" tabindex="0">
                            <ul id="leaderboard-list-rds" class="leaderboard-list" aria-label="Stereogram Sessions List"></ul>
                        </div>
                    </div>

                </div> <!-- End modal-scroll-body -->

                <button type="button" id="btn-close-stats" class="close-btn" aria-label="Close Dashboard">OK</button>
            </div>
        </div>
    </aside>

    <!--
      @architecture Offline PWA Bootstrapper
      PWA offline-first architecture requires the orchestrator to load purely from
      the transpiled TS bundle after compilation.
    -->
    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js"></script>
    <script type="module" src="/src/app.ts"></script>
    <script type="module" src="/src/vue-app.ts"></script>
</body>
</html>
